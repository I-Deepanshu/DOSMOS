<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .starfield-bg {
            background: radial-gradient(circle at 50% 50%, rgba(255, 230, 100, 0.08) 0%, rgba(18, 18, 31, 1) 70%);
            position: relative;
            overflow: hidden;
        }
        .starfield-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                              radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
                              radial-gradient(1px 1px at 90px 40px, #ddd, rgba(0,0,0,0));
            background-size: 200px 200px;
            opacity: 0.3;
        }
        .central-sun {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 214, 0, 0.05) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
        }
        .glass-card {
            backdrop-filter: blur(24px);
            background: rgba(52, 51, 65, 0.4);
        }
        .rim-light-purple {
            box-shadow: inset 0 0 10px rgba(127, 90, 240, 0.3), 0 0 5px rgba(127, 90, 240, 0.1);
        }

<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<main class="starfield-bg min-h-screen flex items-center justify-center p-6 relative">
<div class="central-sun"></div>
<div class="relative z-10 w-full max-w-md">
<!-- Brand Anchor -->
<div class="text-center mb-16">
<h1 class="font-headline text-5xl font-bold tracking-[0.2em] text-primary uppercase mb-4">
                    DOSMOS
                </h1>
<p class="font-label text-on-surface-variant text-sm tracking-[0.15em] uppercase">
                    The Arrival
                </p>
</div>
<!-- Login Container -->
<div class="glass-card p-10 rounded-full border border-outline-variant/10 shadow-2xl relative">
<!-- Abstract Comms Orbit Signature Component -->
<div class="absolute -top-6 -right-6 w-12 h-12 rounded-full border border-secondary/30 flex items-center justify-center bg-surface-container-low/80 backdrop-blur-md">
<div class="w-3 h-3 rounded-full bg-secondary animate-pulse shadow-[0_0_12px_#89ceff]"></div>
</div>
<div class="space-y-12">
<div class="space-y-2">
<h2 class="font-headline text-3xl font-light text-on-surface tracking-tight">
                            locate your Star
                        </h2>
<p class="text-on-surface-variant text-xs font-label tracking-widest uppercase">
                            Secure Authentication sequence active
                        </p>
</div>
<form class="space-y-8">
<!-- Identity Field -->
<div class="group relative">
<label class="block text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-2 ml-1" for="identity">
                                celestial Identity
                            </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-secondary/60 text-lg">fingerprint</span>
<input class="w-full bg-transparent border-b border-outline-variant/30 py-3 pl-8 text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-secondary transition-all font-body text-sm rim-light-blue rounded-lg px-4" id="identity" name="identity" placeholder="your unique frequency" type="text"/>
</div>
</div>
<!-- Key Field -->
<div class="group relative">
<label class="block text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-2 ml-1" for="access-key">
                                access Key
                            </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-primary/60 text-lg">star_rate</span>
<input class="w-full bg-transparent border-b border-outline-variant/30 py-3 pl-8 text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary transition-all font-body text-sm rim-light-purple rounded-lg px-4" id="access-key" name="access-key" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- CTA -->
<div class="pt-4">
<button class="w-full group relative flex items-center justify-center py-4 px-8 overflow-hidden rounded-full font-headline font-bold text-sm tracking-[0.1em] uppercase transition-all duration-500 bg-gradient-to-br from-primary-container to-primary text-on-primary-container shadow-lg hover:shadow-primary-container/20 hover:scale-[1.02] active:scale-95" type="submit">
<span>Locate My Star</span>
<span class="material-symbols-outlined ml-2 text-lg group-hover:translate-x-1 transition-transform">rocket_launch</span>
</button>
</div>
</form>
<!-- Footer Links -->
<div class="flex justify-between items-center pt-4">
<a class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant hover:text-secondary transition-colors" href="#">
                            lost in the Void?
                        </a>
<div class="h-px w-8 bg-outline-variant/20"></div>
<a class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">
                            Request Entry
                        </a>
</div>
</div>
</div>
<!-- Background Decorative Image -->
<div class="absolute -bottom-40 -left-40 w-80 h-80 opacity-20 pointer-events-none">
<img class="w-full h-full object-contain" data-alt="soft ethereal cosmic nebula with swirling purple and blue gas clouds and distant twinkling stars on a black background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbZRb7VOY96Cxsy-fvcXgFPta8KC13ZL0D-8bfxvGDibO3e6ibVhZHq6nwcuw6-YUXgqR9Wg4bj5ZO92qIoVqSrjHAxX6uv7CnIqqr4Mdi2YvpO6Vy-zf560_rqxZGEQppFo8n3Bc6Qlaw5ddqXZ9XfO-5d_nVTwCs5IS4Ydl7eIxymMUV8qRDorQZB58tNT2sCNdLE43HdTrJ5drqVqALe0RcRcsIcw1pGMF0Izb8wgMJ7Os1IXp3ACic_9VRavHI3vKxnv7fwu8"/>

<div class="text-[10px] font-label tracking-[0.3em] uppercase text-on-surface-variant">
                Sector: Orion-9
            </div>
<div class="text-[10px] font-label tracking-[0.3em] uppercase text-on-surface-variant">
                Lat: 42.3601 N | Long: 71.0589 W
            </div>
</div>
<div class="fixed bottom-10 right-10 flex items-center gap-4 opacity-40">
<div class="flex flex-col items-end gap-1">
<div class="text-[10px] font-label tracking-[0.3em] uppercase text-on-surface-variant">
                    Protocol: encrypted
                </div>
<div class="text-[10px] font-label tracking-[0.3em] uppercase text-on-surface-variant">
                    Node: dosmos-vault-01
                </div>
</div>
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
